# playbook: check the first show on homepage
# set LGPAC_TARGET_URL env var to override the default target
name: check_first_show
description: open homepage, click first show, extract detail info

steps:
  - action: navigate
    url: __TARGET_URL__
    wait_after: 5

  - action: dismiss_popup

  - action: screenshot
    name: homepage

  - action: extract_meta

  # click the first visible show card — replace text as needed
  - action: click_text
    text: "银河喜剧群星秀"
    wait_after: 3000
    on_fail: continue

  - action: dismiss_popup

  - action: wait_for_load
    timeout: 10000

  - action: screenshot
    name: show_detail

  - action: extract_meta

  - action: go_back
