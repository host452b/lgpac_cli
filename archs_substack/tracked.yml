# ============================================================
# Substack Tracked AI Newsletters (80 publications)
# ============================================================
#
# single source of truth for tracked AI-focused Substack publications.
# read by substack monitor -> fetch https://{slug}.substack.com/feed
# -> archive -> docs_substack/index.md -> email.
#
# ---- HOW TO EDIT ----
# same rules as xbirds: append at end, keep seq stable.
#
# ---- ENTRY SCHEMA ----
#   seq:        sequential ID
#   slug:       substack handle (for https://{slug}.substack.com/feed)
#   name:       publication name
#   author:     main writer(s)
#   category:   content type (see below)
#   tags:       topic labels
#   wave_stage: 0-4 propagation phase
#   feed_url:   (optional) custom RSS feed URL for non-substack or custom-domain feeds
#   # comment:  one-line bio above each entry
#
# NOTE: if feed_url is set, the monitor uses it directly instead of
# the default https://{slug}.substack.com/feed template.
# this allows tracking newsletters on Beehiiv, Ghost, custom domains, etc.
#
# ============================================================
# CATEGORY (10 types)
# ============================================================
#
#   news-digest        ( 12)  daily/weekly quick hits, tools, roundups
#   research-deep      (  8)  paper breakdowns, technical deep dives
#   practical-tools    (  8)  workflows, prompts, product reviews
#   thinker-critic     ( 10)  philosophy, risks, hype-busting, society
#   education-tutorial (  5)  teaching, tutorials, explanations
#   business-strategy  ( 10)  industry analysis, startups, investment, infra
#   china-ai           (  3)  Chinese ecosystem, translations, analysis
#   ethics-policy      (  3)  safety, bias, governance, regulation
#   agent-focused      (  5)  agents, automation, dev frameworks
#   hustle-monetize    (  5)  tool lists, courses, "make money with AI"
#
# ============================================================
# WAVE_STAGE (same 0-4 as xbirds)
# ============================================================
#
#   0 = ignition   (  5)  primary research, arXiv-level, frontier
#   1 = momentum   ( 22)  expert breakdowns, practitioner interpretation
#   2 = explosion  ( 28)  business impact, wide adoption discussion
#   3 = decay      ( 15)  mainstream summaries, mass popularization
#   4 = fading     (  5)  commoditized lists, hustle, repackaging
#
# decision matrix:
#   only stage 0 writing -> frontier research, unvalidated
#   stage 1 picks it up  -> expert traction, high alpha
#   stage 2 covers it    -> industry mainstream, time to act
#   stage 3 digests it   -> common knowledge, move on
#   stage 4 repackages   -> topic exhausted
#
# ============================================================
# ENTRIES
# ============================================================


