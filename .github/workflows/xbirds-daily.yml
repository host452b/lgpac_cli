name: xbirds daily digest

on:
  schedule:
    # once daily at UTC 00:00 (Beijing 08:00)
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  xbirds:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      LGPAC_NOTIFY_EMAIL: ${{ secrets.LGPAC_NOTIFY_EMAIL }}
      LGPAC_SMTP_SERVER: ${{ secrets.LGPAC_SMTP_SERVER }}
      LGPAC_SMTP_PORT: ${{ secrets.LGPAC_SMTP_PORT }}
      LGPAC_SMTP_USER: ${{ secrets.LGPAC_SMTP_USER }}
      LGPAC_SMTP_PASS: ${{ secrets.LGPAC_SMTP_PASS }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: install dependencies
        run: pip install requests typer rich pyyaml

      - name: run xbirds daily digest
        run: python lgpac_cli.py xbirds --page --notify

      - name: commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs_xbirds/ archs_xbirds/
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "xbirds: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
