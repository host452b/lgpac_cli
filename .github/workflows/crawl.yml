name: scheduled monitor

on:
  schedule:
    # every 12 hours (UTC 00:00 and 12:00 -> Beijing 08:00 and 20:00)
    - cron: "0 0,12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      LGPAC_TARGET_URL: ${{ vars.LGPAC_TARGET_URL }}
      LGPAC_WEBHOOK_URL: ${{ secrets.LGPAC_WEBHOOK_URL }}
      LGPAC_NOTIFY_EMAIL: ${{ secrets.LGPAC_NOTIFY_EMAIL }}
      LGPAC_SMTP_SERVER: ${{ secrets.LGPAC_SMTP_SERVER }}
      LGPAC_SMTP_PORT: ${{ secrets.LGPAC_SMTP_PORT }}
      LGPAC_SMTP_USER: ${{ secrets.LGPAC_SMTP_USER }}
      LGPAC_SMTP_PASS: ${{ secrets.LGPAC_SMTP_PASS }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: install dependencies
        run: pip install requests typer rich pyyaml

      - name: run monitor
        run: python lgpac_cli.py monitor --price 120 --rss --page --notify --email

      - name: commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add RSS.md docs/ monitor_history.json
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "monitor: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
