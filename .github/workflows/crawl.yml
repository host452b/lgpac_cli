name: scheduled monitor

on:
  schedule:
    # every 4 hours
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      LGPAC_TARGET_URL: ${{ vars.LGPAC_TARGET_URL }}
      LGPAC_WEBHOOK_URL: ${{ secrets.LGPAC_WEBHOOK_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: install dependencies
        run: pip install requests typer rich pyyaml

      - name: run monitor
        run: python lgpac_cli.py monitor --price 120 --rss --page --notify

      - name: commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add RSS.md docs/ data/
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "monitor: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
