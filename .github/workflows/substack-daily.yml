name: substack daily digest

on:
  schedule:
    # once daily at UTC 01:00 (Beijing 09:00, offset from xbirds at 00:00)
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      hours:
        description: "lookback window in hours (default 24)"
        required: false
        default: "24"
        type: string

permissions:
  contents: write

jobs:
  substack:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      LGPAC_NOTIFY_EMAIL: ${{ secrets.LGPAC_NOTIFY_EMAIL }}
      LGPAC_SMTP_SERVER: ${{ secrets.LGPAC_SMTP_SERVER }}
      LGPAC_SMTP_PORT: ${{ secrets.LGPAC_SMTP_PORT }}
      LGPAC_SMTP_USER: ${{ secrets.LGPAC_SMTP_USER }}
      LGPAC_SMTP_PASS: ${{ secrets.LGPAC_SMTP_PASS }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: install dependencies
        run: pip install requests typer rich pyyaml

      - name: run substack digest
        run: |
          HOURS="${{ github.event.inputs.hours || '24' }}"
          echo "lookback: ${HOURS}h"
          python lgpac_cli.py substack --page --notify --hours "$HOURS"

      - name: commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs_substack/ archs_substack/
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "substack: $(date -u '+%Y-%m-%d %H:%M UTC')"
            for i in 1 2 3; do
              git push && break
              echo "push failed, pulling and retrying ($i/3)"
              git pull --rebase origin main
            done
          fi
