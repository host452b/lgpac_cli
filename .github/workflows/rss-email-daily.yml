name: rss email digest

on:
  schedule:
    # once daily at UTC 02:00 (Beijing 10:00, after xbirds at 08:00)
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      hours:
        description: "lookback window in hours (default 24)"
        required: false
        default: "24"
        type: string

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      LGPAC_NOTIFY_EMAIL: ${{ secrets.LGPAC_NOTIFY_EMAIL }}
      LGPAC_SMTP_SERVER: ${{ secrets.LGPAC_SMTP_SERVER }}
      LGPAC_SMTP_PORT: ${{ secrets.LGPAC_SMTP_PORT }}
      LGPAC_SMTP_USER: ${{ secrets.LGPAC_SMTP_USER }}
      LGPAC_SMTP_PASS: ${{ secrets.LGPAC_SMTP_PASS }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: install dependencies
        run: pip install -r rss_email/requirements.txt

      - name: preflight — validate OPML and env
        run: |
          python -c "
          import sys, os
          sys.path.insert(0, 'rss_email')
          from feed_parser import parse_opml
          feeds = parse_opml('rss_email/feeds.opml')
          print(f'feeds: {len(feeds)}')
          stages = {}
          for f in feeds:
              s = f.get('wave_stage', -1)
              stages[s] = stages.get(s, 0) + 1
          for s in sorted(stages):
              if s >= 0:
                  print(f'  stage {s}: {stages[s]} feeds')
          missing = [v for v in ['LGPAC_NOTIFY_EMAIL','LGPAC_SMTP_USER','LGPAC_SMTP_PASS'] if not os.environ.get(v)]
          if missing:
              print(f'WARNING: missing env vars: {missing}')
          else:
              print('SMTP: configured')
          "

      - name: run rss digest
        run: |
          HOURS="${{ github.event.inputs.hours || '24' }}"
          echo "lookback: ${HOURS}h"
          echo "start: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          python rss_email/main.py --hours "$HOURS"
          echo "end: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
